<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update in Progress</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gray: #0f0f0f;
            --grid-color: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-gray);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
        }

        /* --- Techno Grid Background --- */
        .tech-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Moving Scanline Overlay */
        .tech-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(255, 255, 255, 0.02) 50%,
                transparent 100%
            );
            background-size: 100% 4px;
            animation: scanline 10s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* --- Rainbow Neon Text --- */
        h1 {
            font-size: clamp(1.8rem, 8vw, 4rem);
            text-transform: uppercase;
            letter-spacing: clamp(4px, 1vw, 12px);
            text-align: center;
            padding: 20px;
            line-height: 1.2;
            z-index: 10;
            
            /* Clean White Core */
            color: #fff;
            
            /* The Rainbow Animation */
            animation: rainbow-glow 5s linear infinite;
        }

        @keyframes rainbow-glow {
            0% { 
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
            }
            16% { 
                text-shadow: 0 0 10px #ff8800, 0 0 20px #ff8800, 0 0 40px #ff8800;
            }
            33% { 
                text-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00, 0 0 40px #ffff00;
            }
            50% { 
                text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 40px #00ff00;
            }
            66% { 
                text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
            }
            83% { 
                text-shadow: 0 0 10px #0000ff, 0 0 20px #0000ff, 0 0 40px #0000ff;
            }
            100% { 
                text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            }
        }

        /* Subtle flicker for realism */
        h1::after {
            content: "";
            position: absolute;
            inset: 0;
            background: transparent;
            animation: flicker 0.15s infinite alternate;
            pointer-events: none;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="tech-bg"></div>

    <h1>The test is currently being updated.</h1>

</body>
</html>
