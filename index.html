<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update in Progress</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #18181b;       
            --card-bg: #27272a;        
            --text-primary: #f4f4f5;   
            --text-dim: #a1a1aa;       
            --accent-primary: #d4d4d8; 
            --radius-lg: 28px;
            --soft-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .update-box {
            background-color: var(--card-bg);
            padding: 60px 50px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: var(--soft-shadow);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            font-size: 3.2rem;
            margin: 0 0 20px 0;
            color: var(--accent-primary);
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        p {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-dim);
            margin: 0;
        }

        @media (max-width: 800px) {
            h1 {
                font-size: 2.2rem;
            }
            p {
                font-size: 1.1rem;
            }
            .update-box {
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="update-box">
        <h1>Test is currently being updated</h1>
        <p>It usually takes about 10 minutes.</p>
    </div>

</body>
</html>
