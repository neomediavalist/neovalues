<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideology Description</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg" href="icon.svg">
</head>
<body>
    <div class="main-container">
        <img id="ideology-icon" src="" alt="" class="desc-icon">
        <h1 id="ideology-title">Loading...</h1>
        
        <div class="description-box">
            <p id="ideology-description"></p>
        </div>

        <div class="button-container">
            <button id="icon-source-btn" style="display: none;" onclick="openIconSource()">Original Icon Source</button>
            <div id="original-work-sign" class="original-work-sign">Original Work</div>
            <button onclick="window.history.back()">Back</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ideologyId = urlParams.get('id');
        const category = urlParams.get('cat');
        const type = urlParams.get('type');

        const titleEl = document.getElementById('ideology-title');
        const descEl = document.getElementById('ideology-description');
        const iconEl = document.getElementById('ideology-icon');
        const sourceBtn = document.getElementById('icon-source-btn');
        const originalSign = document.getElementById('original-work-sign');

        if (ideologyId) {
            if (type === 'ideology') {
                titleEl.innerText = ideologyId.toUpperCase();
                iconEl.style.display = 'none';
                sourceBtn.style.display = 'none';
                originalSign.style.display = 'none';
                descEl.innerText = descriptions[ideologyId] || "Ideology description coming soon!";
            } else if (category) {
                titleEl.innerText = ideologyId.replace(/_/g, ' ').toUpperCase();
                iconEl.src = `icons/${category}/${ideologyId}.svg`;
                descEl.innerText = descriptions[ideologyId] || "Description coming soon!";

                if (iconSources[ideologyId] && iconSources[ideologyId] !== "") {
                    sourceBtn.style.display = 'block';
                    originalSign.style.display = 'none';
                } else {
                    sourceBtn.style.display = 'none';
                    originalSign.style.display = 'block';
                }
            }
        }

        function openIconSource() {
            const sourceUrl = iconSources[ideologyId];
            if (sourceUrl) window.open(sourceUrl, '_blank');
        }
    </script>
</body>
</html>
